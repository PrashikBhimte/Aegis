<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Threat Vault</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            width: 350px;
            padding: 15px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #38bdf8;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .title {
            font-size: 1.2em;
            font-weight: bold;
            color: #38bdf8;
        }
        .status {
            display: flex;
            align-items: center;
            font-size: 0.8em;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            background-color: #38bdf8;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
        #history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background-color: #1e293b;
            border-left: 4px solid #ef4444;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .card .url {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
            color: #e2e8f0;
        }
        .card .reason {
            background-color: #ef4444;
            color: #fff;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            display: inline-block;
            margin-top: 8px;
        }
        .card .time {
            font-size: 0.8em;
            color: #94a3b8;
            margin-top: 8px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Threat Vault</div>
        <div class="status">
            <div class="status-indicator"></div>
            <span>Aegis Active</span>
        </div>
    </div>
    <div id="history-list">
        <!-- History items will be injected here by popup.js -->
    </div>
    <script src="popup.js"></script>
</body>
</html>
