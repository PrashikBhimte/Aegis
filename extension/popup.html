<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Threat Vault</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <h1 class="title">🛡️ Aegis Threat Vault</h1>
                <div class="status">
                    <div class="status-indicator" id="status-light"></div>
                    <span id="status-text">Aegis Active</span>
                </div>
            </div>
            <div class="mute-control">
                <span class="mute-label">Audio Alerts</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="mute-toggle">
                    <span class="slider"></span>
                </label>
                <span class="mute-status" id="mute-status">ON</span>
            </div>
        </div>
        
        <div class="section-title">Recent Threat Detections</div>
        <div id="history-list">
            <!-- History items will be injected here by popup.js -->
        </div>
        
        <div class="footer">
            <span class="version">Aegis-Live v2.0 | Guardian Mode</span>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
